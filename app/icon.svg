        <path d="M78 84 C 67 95, 55 102, 43 105"/>
        <path d="M86 86 C 87 100, 93 111, 102 118"/>
      </g>
    </g>

    <circle cx="93.5" cy="118" r="4.2" fill="#1b3626"/>
    <circle cx="110.5" cy="118" r="4.2" fill="#1b3626"/>
    <circle cx="102" cy="131" r="4.2" fill="#1b3626"/>

    <path d="M 129 115 A 11 11 0 1 0 147 115" stroke="#b08d3e" stroke-width="4" stroke-linecap="round" fill="none"/>

    <path d="M 120 58 V 152 M 84 105 H 156" stroke="#b08d3e" stroke-width="1.5" fill="none"/>
  </g>
  <path d="M 84 58 L 156 58 L 156 108 C 156 130, 140 144, 120 152 C 100 144, 84 130, 84 108 Z" fill="none" stroke="#b08d3e" stroke-width="3"/>

