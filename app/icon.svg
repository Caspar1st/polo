        <rect x="-4.5" y="12" width="9" height="5" rx="2.5" fill="#b08d3e" stroke="none"/>
      </g>
      <g transform="rotate(-28)">
        <line x1="0" y1="-16" x2="0" y2="12"/>
        <rect x="-4.5" y="12" width="9" height="5" rx="2.5" fill="#b08d3e" stroke="none"/>
      </g>
    </g>

