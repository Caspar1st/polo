<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- Frankfurter Polo Club arms — static twin of components/shared/ClubCrest.tsx.
       Royal-arms-style achievement: crown, quartered shield (mallets / pony /
       polo balls / horseshoe), horse supporters, motto "VIRTUS IN EQUIS". -->
  <defs>
